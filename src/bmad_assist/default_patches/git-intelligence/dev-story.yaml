# Git intelligence for dev-story workflow
# Focus: Implementation-related git context

extends: common.yaml

phase_commands:
  - name: "Recent Implementation Commits"
    description: "Recent commits (excluding tests/docs for implementation focus)"
    command: "git log --oneline -8"

  - name: "Current Branch"
    description: "Current git branch for implementation context"
    command: "git branch --show-current"

  - name: "Uncommitted Changes"
    description: "Modified source files (implementation-focused, capped)"
    command: "git diff --name-only | grep -E '\\.(py|js|ts|tsx|jsx|go|rs|java|kt|cs|fs|rb|php|c|cc|cpp|h|hpp|swift|scala)$' | head -n 40 || echo '(no source changes)'"

  - name: "Staged Changes"
    description: "Staged source files (implementation-focused, capped)"
    command: "git diff --cached --name-only | grep -E '\\.(py|js|ts|tsx|jsx|go|rs|java|kt|cs|fs|rb|php|c|cc|cpp|h|hpp|swift|scala)$' | head -n 40 || echo '(no staged source changes)'"
